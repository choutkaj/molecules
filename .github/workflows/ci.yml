name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo xtask dashboard --check
      - run: cargo xtask skills --check
      - run: cargo xtask corpus check --corpus tiny --require-data
      - run: cargo xtask validate --feature all --corpus tiny
