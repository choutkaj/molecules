name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  msrv:
    name: MSRV (Rust 1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - run: cargo check --workspace --all-targets --locked

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo test --workspace --all-features --doc --locked
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps --locked
      - name: Check packaged license copies
        run: |
          cmp LICENSE crates/molecules/LICENSE
          cmp LICENSE crates/molecules-dreiding/LICENSE
      - run: cargo package -p molecules --locked
      - run: cargo package -p molecules-dreiding --locked --no-verify
      - run: cargo xtask dashboard --check
      - run: cargo xtask skills --check

  fuzz-smoke:
    name: Parser fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz run mol_v2000 -- -runs=256 -max_len=4096 -seed=1
      - run: cargo +nightly fuzz run mol_v3000 -- -runs=256 -max_len=4096 -seed=2
      - run: cargo +nightly fuzz run sdf_v2000 -- -runs=256 -max_len=4096 -seed=3
      - run: cargo +nightly fuzz run smiles -- -runs=256 -max_len=4096 -seed=4
      - run: cargo +nightly fuzz run mmcif -- -runs=256 -max_len=4096 -seed=5
