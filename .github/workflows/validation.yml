name: Reference validation

on:
  workflow_dispatch:
    inputs:
      feature:
        description: Feature ID or all
        required: true
        type: string
      corpus:
        description: Corpus ID or all
        required: true
        default: tiny
        type: string

jobs:
  validate:
    name: Validate feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask validate --feature "${{ inputs.feature }}" --corpus "${{ inputs.corpus }}"
