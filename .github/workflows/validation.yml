name: Reference validation

on:
  workflow_dispatch:
    inputs:
      feature:
        description: Feature ID or all
        required: true
        type: string
      corpus:
        description: Corpus ID or all
        required: true
        default: smoke
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Check corpus integrity
        env:
          CORPUS: ${{ inputs.corpus }}
        shell: bash
        run: |
          set -o pipefail
          cargo xtask corpus check --corpus "$CORPUS" --require-data 2>&1 | tee corpus-check.log
      - name: Run validation
        env:
          CORPUS: ${{ inputs.corpus }}
          FEATURE: ${{ inputs.feature }}
        shell: bash
        run: |
          set -o pipefail
          cargo xtask validate --feature "$FEATURE" --corpus "$CORPUS" 2>&1 | tee validation.log
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: validation-logs
          path: |
            corpus-check.log
            validation.log
