name: Dashboard Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - crates/xtask/**
      - features/DASHBOARD.html
      - validation/corpora/**/corpus.toml
      - validation/corpora/**/status.toml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask dashboard --check
      - run: |
          mkdir -p _site
          cp features/DASHBOARD.html _site/index.html
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
