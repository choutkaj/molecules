name: Dependency security audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * 1"
  pull_request:
    paths:
      - Cargo.lock
      - "**/Cargo.toml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
